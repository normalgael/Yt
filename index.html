<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Roogle YouTube</title>
<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  margin:0;
}

header{
  background:#181818;
  padding:15px;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  font-size:16px;
}

button{
  padding:10px;
  background:red;
  color:white;
  border:none;
}

#videos{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.video{
  cursor:pointer;
}

.video img{
  width:100%;
  border-radius:6px;
}

#player{
  width:100%;
  height:500px;
}
</style>
</head>

<body>

<header>
<input id="searchBox" placeholder="Search YouTube">
<button onclick="search()">Search</button>
</header>

<div id="player"></div>
<div id="videos"></div>

<script src="script.js"></script>

</body>
</html>
